<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIÈRE | متجر الأزياء الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --black: #111; --white: #ffffff; --gray: #f9f9f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--white); color: var(--black); line-height: 1.6; }

        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; background: white; border-bottom: 1px solid #eee; sticky; top: 0; z-index: 1000; position: sticky; }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: 3px; font-family: 'Amiri', serif; }
        .cart-icon { position: relative; cursor: pointer; font-size: 22px; }
        .badge { position: absolute; top: -8px; right: -10px; background: var(--black); color: white; font-size: 11px; padding: 2px 7px; border-radius: 50%; }

        /* Slider Section */
        .slider { position: relative; height: 80vh; overflow: hidden; background: #000; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; }
        .slide.active { opacity: 1; }
        .slide::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
        .hero-text { position: relative; z-index: 2; text-align: center; color: white; }
        .hero-text h1 { font-family: 'Amiri', serif; font-size: clamp(2rem, 8vw, 5rem); margin-bottom: 20px; }
        
        /* Products Grid */
        .container { padding: 80px 8%; }
        .section-title { text-align: center; margin-bottom: 50px; font-family: 'Amiri', serif; font-size: 2.5rem; position: relative; }
        .section-title::after { content: ''; width: 50px; height: 2px; background: var(--gold); position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        .card { background: var(--white); transition: 0.4s; position: relative; }
        .img-container { overflow: hidden; position: relative; aspect-ratio: 3/4; }
        .card img { width: 100%; h: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover img { transform: scale(1.1); }
        .add-btn { position: absolute; bottom: 0; width: 100%; background: var(--black); color: white; border: none; padding: 15px; cursor: pointer; transform: translateY(100%); transition: 0.3s; font-weight: bold; }
        .card:hover .add-btn { transform: translateY(0); }
        .info { padding: 20px 0; text-align: center; }
        .price { color: var(--gold); font-weight: 700; font-size: 1.1rem; }

        /* WhatsApp Button */
        .whatsapp-float { position: fixed; bottom: 30px; left: 30px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 999; display: flex; align-items: center; gap: 10px; }
        
        footer { background: var(--black); color: white; padding: 60px 8%; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">LUMIÈRE</div>
        <div class="cart-icon" onclick="checkout()">
            🛒 <span class="badge" id="cart-count">0</span>
        </div>
    </nav>

    <header class="slider">
        <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1200')">
            <div class="hero-text">
                <h1>أناقة بلا حدود</h1>
                <p>تشكيلة الصيف الجديدة وصلت الآن</p>
            </div>
        </div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1200')">
            <div class="hero-text">
                <h1>فخامة التفاصيل</h1>
                <p>عبر عن شخصيتك بأفضل الموديلات</p>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">وصل حديثاً</h2>
        <div class="grid">
            <div class="card">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=500" alt="">
                    <button class="add-btn" onclick="addToCart('معطف شتوي فاخر', 450)">إضافة للسلة +</button>
                </div>
                <div class="info">
                    <h3>معطف شتوي فاخر</h3>
                    <p class="price">450 ر.س</p>
                </div>
            </div>
            <div class="card">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=500" alt="">
                    <button class="add-btn" onclick="addToCart('طقم صيفي كاجوال', 320)">إضافة للسلة +</button>
                </div>
                <div class="info">
                    <h3>طقم صيفي كاجوال</h3>
                    <p class="price">320 ر.س</p>
                </div>
            </div>
            <div class="card">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500" alt="">
                    <button class="add-btn" onclick="addToCart('حقيبة يد جلدية', 600)">إضافة للسلة +</button>
                </div>
                <div class="info">
                    <h3>حقيبة يد جلدية</h3>
                    <p class="price">600 ر.س</p>
                </div>
            </div>
        </div>
    </div>

    <a href="#" class="whatsapp-float" id="whatsapp-link" onclick="sendToWhatsApp()">
        <span>طلب عبر واتساب</span>
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20" alt="">
    </a>

    <footer>
        <div class="logo">LUMIÈRE</div>
        <p style="margin-top: 20px; opacity: 0.6;">جميع الحقوق محفوظة © 2026</p>
    </footer>

    <script>
        // 1. منطق السلايدر (Slider Logic)
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        function autoSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(autoSlide, 4000);

        // 2. سلة التسوق (Cart Logic)
        let cart = [];
        function addToCart(name, price) {
            cart.push({ name, price });
            document.getElementById('cart-count').innerText = cart.length;
            alert(`تمت إضافة ${name} للسلة!`);
        }

        // 3. إرسال للواتساب (WhatsApp logic)
        function sendToWhatsApp() {
            if (cart.length === 0) {
                alert("السلة فارغة! أضف منتجات أولاً.");
                return;
            }
            let phone = "201234567890"; // ضع رقمك هنا بالكود الدولي
            let message = "مرحباً لومييه، أرغب في طلب المنتجات التالية:%0a";
            let total = 0;
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} - ${item.price} ر.س%0a`;
                total += item.price;
            });
            message += `%0aالإجمالي: ${total} ر.س`;
            
            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        }

        function checkout() {
            if (cart.length > 0) sendToWhatsApp();
            else alert("سلتك فارغة حالياً.");
        }
    </script>
</body>
</html>
