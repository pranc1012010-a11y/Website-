<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية الموضة | Fashion Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .product-card:hover .buy-overlay { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md shadow-sm p-4 flex justify-between items-center px-6 md:px-20">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 text-white p-2 rounded-lg"><i class="fas fa-vest-patches text-xl"></i></div>
            <h1 class="text-2xl font-black tracking-tighter text-indigo-900">MODA<span class="text-indigo-500">MAX</span></h1>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="document.getElementById('sellSection').scrollIntoView({behavior: 'smooth'})" class="hidden md:block text-indigo-600 font-bold hover:text-indigo-800">ابدأ البيع</button>
            <div class="relative">
                <i class="fas fa-shopping-bag text-2xl text-gray-700"></i>
                <span id="cartCount" class="absolute -top-2 -left-2 bg-red-500 text-white text-xs rounded-full px-1.5">0</span>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-r from-indigo-700 to-purple-800 text-white py-16 px-6 text-center shadow-inner">
        <h2 class="text-4xl md:text-6xl font-black mb-4">أكبر منصة لتبادل الموضة</h2>
        <p class="text-indigo-100 text-lg max-w-2xl mx-auto">بيع ملابسك القديمة، واشترِ أحدث الصيحات بأسعار خيالية. كل شيء في مكان واحد.</p>
    </header>

    <main class="container mx-auto mt-10 p-4 grid grid-cols-1 lg:grid-cols-4 gap-10">
        
        <aside id="sellSection" class="lg:col-span-1">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 sticky top-24">
                <h3 class="text-2xl font-black mb-6 text-gray-800"><i class="fas fa-plus-circle ml-2 text-indigo-500"></i>أضف قطعتك</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-1">صورة القطعة</label>
                        <input type="file" id="pImage" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer" />
                    </div>
                    <input id="pName" type="text" placeholder="اسم المنتج (مثلاً: هودي قطني)" class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                    <div class="flex gap-2">
                        <input id="pPrice" type="number" placeholder="السعر $" class="w-1/2 p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none">
                        <select id="pSize" class="w-1/2 p-4 bg-gray-50 border-none rounded-2xl outline-none">
                            <option>S</option><option selected>M</option><option>L</option><option>XL</option>
                        </select>
                    </div>
                    <button onclick="addProduct()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-indigo-200 transition-all active:scale-95">انشر في المتجر</button>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-3">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-gray-800">المعروض الآن 🔥</h2>
                <span class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full font-bold text-sm">تحديث مباشر</span>
            </div>
            
            <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8 text-right">
                </div>
        </section>
    </main>

    <footer class="mt-20 py-10 border-t text-center text-gray-400 text-sm">
        &copy; 2026 MODAMAX - جميع الحقوق محفوظة لملك الموضة الجديد.
    </footer>

    <script>
        let products = JSON.parse(localStorage.getItem('modaStore')) || [];
        let cart = 0;

        // وظيفة تحويل الصورة المرفوعة لرابط يمكن عرضه
        function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const size = document.getElementById('pSize').value;
            const imageFile = document.getElementById('pImage').files[0];

            if (!name || !price) return alert("من فضلك أدخل البيانات الأساسية!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const newProduct = {
                    id: Date.now(),
                    name: name,
                    price: price,
                    size: size,
                    image: imageFile ? e.target.result : 'https://via.placeholder.com/300x400?text=Fashion'
                };

                products.unshift(newProduct);
                localStorage.setItem('modaStore', JSON.stringify(products));
                render();
                clearForm();
            };
            
            if(imageFile) reader.readAsDataURL(imageFile);
            else reader.onload();
        }

        function render() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card group bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-500 border border-gray-100 relative">
                        <div class="h-80 overflow-hidden relative">
                            <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full font-black text-indigo-600 shadow-sm">$${p.price}</div>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-black text-xl text-gray-800">${p.name}</h3>
                                <span class="text-xs bg-gray-100 px-2 py-1 rounded font-bold text-gray-500">${p.size}</span>
                            </div>
                            <button onclick="addToCart()" class="w-full mt-4 bg-gray-900 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-600 transition-colors">
                                <i class="fas fa-cart-plus"></i> شراء الآن
                            </button>
                            <button onclick="deleteProduct(${p.id})" class="absolute top-4 right-4 bg-red-500/10 text-red-500 w-8 h-8 rounded-full opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"><i class="fas fa-trash-alt text-xs"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('modaStore', JSON.stringify(products));
            render();
        }

        function addToCart() {
            cart++;
            document.getElementById('cartCount').innerText = cart;
            alert("تمت الإضافة للسلة! واصل التسوق.");
        }

        function clearForm() {
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pImage').value = '';
        }

        render();
    </script>
</body>
</html>
