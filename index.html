<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIÈRE | متجر الأزياء الرئيسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --black: #111; --white: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--white); overflow-x: hidden; }

        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Amiri', serif; font-size: 30px; font-weight: 900; letter-spacing: 2px; color: var(--black); }
        .cart-btn { background: none; border: none; font-size: 24px; cursor: pointer; position: relative; }
        .cart-count { position: absolute; top: -5px; left: -5px; background: var(--gold); color: white; font-size: 12px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Image Slider (Main Hero) */
        .hero-slider { position: relative; height: 85vh; background: #000; overflow: hidden; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: 1.5s; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; }
        .slide::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
        .hero-content { position: relative; z-index: 5; text-align: center; color: white; }
        .hero-content h1 { font-family: 'Amiri', serif; font-size: 4rem; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        /* Products Grid */
        .shop-section { padding: 80px 8%; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 40px; }
        .item-card { border: 1px solid #f0f0f0; transition: 0.3s; position: relative; overflow: hidden; }
        .item-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .item-card img { width: 100%; height: 400px; object-fit: cover; transition: 0.5s; }
        .item-card:hover img { transform: scale(1.05); }
        .buy-overlay { position: absolute; bottom: -50px; left: 0; right: 0; background: var(--black); color: white; padding: 15px; cursor: pointer; transition: 0.3s; font-weight: bold; border: none; }
        .item-card:hover .buy-overlay { bottom: 0; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.2rem; }

        /* Floating WhatsApp */
        .wa-button { position: fixed; bottom: 30px; left: 30px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 2000; display: flex; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">LUMIÈRE</div>
        <button class="cart-btn" onclick="sendToWhatsApp()">
            🛒 <span class="cart-count" id="count">0</span>
        </button>
    </nav>

    <div class="hero-slider">
        <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1200')">
            <div class="hero-content"><h1>مجموعة الربيع</h1><p>أزياء تناسب ذوقك الرفيع</p></div>
        </div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1200')">
            <div class="hero-content"><h1>أناقة عصرية</h1><p>خامات طبيعية وتصاميم عالمية</p></div>
        </div>
    </div>

    <section class="shop-section">
        <h2 style="font-family: 'Amiri', serif; font-size: 2.5rem;">أحدث القطع</h2>
        <div class="grid">
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=500" alt="">
                <div style="padding: 15px;">
                    <h3>فستان كلاسيك</h3>
                    <p class="price">450 ر.س</p>
                </div>
                <button class="buy-overlay" onclick="addToCart('فستان كلاسيك', 450)">إضافة للسلة +</button>
            </div>
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=500" alt="">
                <div style="padding: 15px;">
                    <h3>بدلة كاجوال</h3>
                    <p class="price">320 ر.س</p>
                </div>
                <button class="buy-overlay" onclick="addToCart('بدلة كاجوال', 320)">إضافة للسلة +</button>
            </div>
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500" alt="">
                <div style="padding: 15px;">
                    <h3>حقيبة فاخرة</h3>
                    <p class="price">580 ر.س</p>
                </div>
                <button class="buy-overlay" onclick="addToCart('حقيبة فاخرة', 580)">إضافة للسلة +</button>
            </div>
        </div>
    </section>

    <a href="#" class="wa-button" onclick="sendToWhatsApp()">
        طلب عبر واتساب
    </a>

    <script>
        // سلة المشتريات
        let cart = [];
        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('count').innerText = cart.length;
            alert("تمت الإضافة للسلة بنجاح!");
        }

        // إرسال للواتساب
        function sendToWhatsApp() {
            if (cart.length === 0) return alert("السلة فارغة!");
            let phone = "201234567890"; // ضع رقمك هنا
            let msg = "مرحباً، أود طلب:%0a";
            let total = 0;
            cart.forEach(item => {
                msg += `- ${item.name} (${item.price} ر.س)%0a`;
                total += item.price;
            });
            msg += `%0aالإجمالي: ${total} ر.س`;
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }

        // السلايدر التلقائي
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 4000);
    </script>
</body>
</html>
